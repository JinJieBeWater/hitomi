dependencies:
  idf: '>=5.3,<5.6'
  joltwallet/littlefs:
    version: ^1.10.2
description: Arduino core for ESP32, ESP32-C, ESP32-H, ESP32-P, ESP32-S series of
  SoCs
files:
  exclude:
  - .*
  - .gitlab/
  - .gitlab/**/*
  - docs/
  - docs/**/*
  - idf_component_examples/
  - idf_component_examples/**/*
  - package/
  - package/**/*
  - tests/
  - tests/**/*
  - tools/
  - tools/**/*
  - variants/**/*
  - boards.txt
  - CODE_OF_CONDUCT.md
  - LICENSE.md
  - package.json
  - platform.txt
  - programmers.txt
  include:
  - variants/esp32/**/*
  - variants/esp32c2/**/*
  - variants/esp32c3/**/*
  - variants/esp32c5/**/*
  - variants/esp32c6/**/*
  - variants/esp32c61/**/*
  - variants/esp32h2/**/*
  - variants/esp32p4/**/*
  - variants/esp32s2/**/*
  - variants/esp32s3/**/*
license: LGPL-2.1
repository: git://github.com/espressif/arduino-esp32.git
repository_info:
  commit_sha: c94a9a59dfc294e99a0637cb39a855b8d3e472b5
  path: .
tags:
- arduino
targets:
- esp32
- esp32c2
- esp32c3
- esp32c5
- esp32c6
- esp32c61
- esp32h2
- esp32p4
- esp32s2
- esp32s3
url: https://github.com/espressif/arduino-esp32
version: 3.3.7
