; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = szpi_esp32s3
extra_configs = platformio.local.ini

[hitomi]
shared_build_flags =
	-I include
	-std=gnu++17
hardware_local_flags =

[env:szpi_esp32s3]
platform = espressif32 @ 6.13.0
board = szpi_esp32s3_n16r8
framework = espidf
extra_scripts = pre:scripts/patch_arduino_component_manifest.py
monitor_speed = 115200
monitor_echo = yes
monitor_filters = send_on_enter
monitor_eol = LF
board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv
lib_deps = 
	lvgl/lvgl@9.5.0
	bblanchon/ArduinoJson@7.4.3
build_unflags =
	-std=gnu++11
build_flags = 
	${hitomi.shared_build_flags}
	${hitomi.hardware_local_flags}

[env:native]
platform = native
; Test-only environment. Use `pio test -e native`, not `pio run`.
test_build_src = true
lib_deps =
	bblanchon/ArduinoJson@7.4.3
build_unflags =
	-std=gnu++11
build_src_filter =
	+<core/>
	+<app/api_probe_policy.cpp>
	+<app/runtime_diagnostics.cpp>
	+<app/usb_provisioning_protocol.cpp>
	+<infra/storage/storage_aux_codec.cpp>
	+<infra/storage/template_manifest_codec.cpp>
	+<ui/>
build_flags =
	${hitomi.shared_build_flags}
