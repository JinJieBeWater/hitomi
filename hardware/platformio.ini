; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = szpi_esp32s3

[env:szpi_esp32s3]
platform = espressif32
board = szpi_esp32s3_n16r8
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps = 
	lvgl/lvgl@^9.5.0
	bblanchon/ArduinoJson@^6.21.5
build_unflags =
	-std=gnu++11
build_flags = 
	-I include
	-std=gnu++17

[env:native]
platform = native
; Test-only environment. Use `pio test -e native`, not `pio run`.
test_filter = test_core_rules
test_build_src = true
lib_deps =
	bblanchon/ArduinoJson@^6.21.5
build_unflags =
	-std=gnu++11
build_src_filter =
	+<src/core/>
	+<src/infra/storage/storage_aux_codec.cpp>
	+<src/infra/storage/template_manifest_codec.cpp>
	+<src/ui/>
build_flags =
	-I include
	-std=gnu++17
